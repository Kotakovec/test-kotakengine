<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testovací Web</title>
</head>
<body>

    <div class="container">
        <h1>Test</h1>
        <p>Tady tvorim pokusy</p>
        
        <input type="text" id="userInput" placeholder="Napiš sem něco...">
        <br>
        <button id="testBtn">Klikni na mě!</button>

        <div id="output">
            <em>Tady se zobrazí výsledek...</em>
        </div>
    </div>
    <div id="kotak-wrapper">
    <style>
        /* Styl celého pozadí kolem kapsle (pokud chceš, aby byl wrapper přes celou šířku) */
        #kotak-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            background: transparent; /* Přizpůsobí se tvému webu */
        }

        /* Samotná kapsle (karta) */
        #kotak-engine-card {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1e293b; /* Tmavě modro-šedá */
            padding: 30px;
            border-radius: 24px; /* Hodně kulaté rohy pro vzhled kapsle */
            width: 100%;
            max-width: 480px;
            border: 1px solid #334155;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); /* Silný stín pro efekt hloubky */
            text-align: center;
            color: white;
        }

        #kotak-engine-card h1 { 
            color: #3b82f6; 
            margin: 0 0 5px 0; 
            font-size: 2rem; 
            letter-spacing: -0.025em;
        }

        #kotak-engine-card h3 { 
            color: #94a3b8; 
            font-weight: normal; 
            margin: 0 0 25px 0; 
            font-size: 1.1rem; 
        }

        /* Kontejner pro náhledy */
        .kotak-media-container { 
            background: #000000; 
            border-radius: 16px; 
            margin-bottom: 20px; 
            min-height: 180px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #475569; 
            overflow: hidden; 
            padding: 10px;
        }

        .kotak-media-content { max-width: 100%; max-height: 350px; border-radius: 8px; }

        /* Tlačítka */
        .kotak-btn { 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            color: white; 
            transition: all 0.2s ease; 
            width: 100%; 
            margin-top: 8px; 
            font-size: 1rem;
            display: block;
            text-decoration: none;
        }

        .kotak-btn:active { transform: scale(0.98); }
        .kotak-btn-blue { background: #3b82f6; }
        .kotak-btn-blue:hover { background: #2563eb; }
        .kotak-btn-green { background: #10b981; }
        .kotak-btn-green:hover { background: #059669; }
        .kotak-btn-red { background: #ef4444; }
        .kotak-btn-red:hover { background: #dc2626; }

        /* Inputy */
        .kotak-input-file { 
            margin-bottom: 20px; 
            color: #94a3b8; 
            width: 100%; 
            font-size: 0.9rem;
        }

        .kotak-input-pass { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 12px; 
            border-radius: 10px; 
            background: #0f172a; 
            color: white; 
            border: 1px solid #334155; 
            box-sizing: border-box; 
            outline: none;
        }

        .kotak-input-pass:focus { border-color: #3b82f6; }

        /* Pomocné třídy */
        .kotak-hidden { display: none !important; }
        .kotak-lock-msg { color: #ef4444; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; }
        .kotak-lock-sub { color: #64748b; font-size: 0.85rem; margin-top: 8px; }
        .kotak-action-group { margin-top: 15px; padding-top: 15px; border-top: 1px solid #334155; }
        .kotak-loading-text { color: #3b82f6; font-weight: 500; }
        
        #kotak-file-info { font-size: 0.85rem; color: #94a3b8; margin-bottom: 12px; font-weight: 500; }
    </style>

    <div id="kotak-engine-card">
        <h1>Kotak Engine</h1>
        <h3>File Transform</h3>

        <div id="kotak-upload-section">
            <p style="color: #94a3b8; margin-bottom: 15px;">Vybrat soubor</p>
            <input type="file" id="kotak-fileInput" class="kotak-input-file">
        </div>

        <div id="kotak-player-section" class="kotak-hidden">
            <div id="kotak-file-info"></div>
            <div class="kotak-media-container" id="kotak-mediaHolder"></div>

            <div id="kotak-unlock-zone" class="kotak-hidden">
                <input type="password" id="kotak-unlockPass" class="kotak-input-pass" placeholder="Heslo pro odemčení">
                <button class="kotak-btn kotak-btn-green" onclick="kotakUnlockFile()">ODEMKNOUT</button>
            </div>

            <div id="kotak-action-zone" class="kotak-hidden">
                <button class="kotak-btn kotak-btn-blue" id="kotak-btnKotak" onclick="kotakCreateKotak()">Vytvořit soubor .kotak</button>
                
                <div id="kotak-ppkotak-init">
                    <button class="kotak-btn kotak-btn-red" onclick="kotakShowPPInput()">Vytvořit soubor .ppkotak</button>
                </div>
                
                <div id="kotak-ppkotak-input" class="kotak-hidden kotak-action-group">
                    <input type="password" id="kotak-lockPass" class="kotak-input-pass" placeholder="Heslo pro .ppkotak">
                    <button class="kotak-btn kotak-btn-red" onclick="kotakCreatePPKotak()">POTVRDIT A ZAMKNOUT</button>
                </div>

                <button class="kotak-btn kotak-btn-green" id="kotak-dlOriginal" onclick="kotakDownloadOriginal()">DOWNLOAD ORIGINAL</button>
            </div>
            
            <a href="javascript:void(0)" onclick="location.reload()" style="color: #64748b; font-size: 0.8rem; text-decoration: none; display: block; margin-top: 20px;">← Zvolit jiný soubor</a>
        </div>
    </div>
</div>

</body>
</html>
